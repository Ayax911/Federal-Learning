name: Suite Completa de Investigación (exp08 + exp07 + exp09)

# Pipeline de 3 experimentos en secuencia automática:
#
#   FASE 1 — Servidor solo (no requiere nodos):
#     1a. exp08: centralizado con todas las imágenes (17 139 imgs, 6 datasets)
#     1b. exp07_pretrain: pretrain centralizado con DDSM → final.pt
#
#   FASE 2 — Federado (servidor + 6 nodos, en paralelo por Flower):
#     2a. exp07: FL con warm start desde DDSM pretrain
#     2b. exp09: FL sin warm start (ablación — arranque desde RadImageNet)
#
# Los nodos esperan a que la FASE 1 termine antes de arrancar la FASE 2.
# Dentro de FASE 2, servidor y nodos corren en paralelo; Flower sincroniza rondas.
#
# PREREQUISITOS en la máquina servidor ($HOME/fl-data/):
#   weights/RadImageNet-resnet50.pth   ← checkpoint RadImageNet
#   manifests/ddsm-split.csv           ← para el pretrain
#   manifests/mamo-bench-split.csv     ← para exp08 centralizado
#   data/Preprocessed_Dataset/<todos los 6 datasets>/  ← imágenes para exp08 y pretrain
#
# PREREQUISITOS en cada nodo ($HOME/fl-data/):
#   data/Preprocessed_Dataset/<dataset del nodo>/
#   manifests/node<ID>_manifest.csv

on:
  workflow_dispatch:
    inputs:
      skip_exp08:
        description: "Saltar exp08 (centralizado ya ejecutado)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      skip_pretrain:
        description: "Saltar pretrain DDSM (final.pt ya existe)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      fl_experiments:
        description: "Experimentos FL a ejecutar (separados por espacio)"
        required: false
        default: "exp07_fedavg_resnet50 exp09_fedavg_resnet50"
        type: string

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # FASE 1 — Centralizados: corren solos en el servidor (sin nodos)
  # ══════════════════════════════════════════════════════════════════════════
  centralizados:
    runs-on: [self-hosted, fl-server]
    defaults:
      run:
        shell: bash
    steps:
      - name: exp08 — baseline centralizado (17 139 imgs, todos los datasets)
        if: ${{ github.event.inputs.skip_exp08 == 'false' }}
        run: |
          echo "══════════════════════════════════════════"
          echo "  [servidor] exp08 centralizado — $(date '+%Y-%m-%d %H:%M:%S')"
          echo "══════════════════════════════════════════"
          docker pull ayax911/federal-learning:latest || true
          docker rm -f fedmammo-central 2>/dev/null || true
          docker run --rm \
            --name fedmammo-central \
            --gpus all \
            -v "$HOME/fl-data/configs:/app/configs:ro" \
            -v "$HOME/fl-data/manifests:/app/manifests:ro" \
            -v "$HOME/fl-data/data:/app/data:ro" \
            -v "$HOME/fl-data/weights:/app/weights:ro" \
            -v "$HOME/fl-data/runs:/app/runs" \
            ayax911/federal-learning:latest \
            python scripts/run_centralized.py \
              --config configs/exp08_centralized_resnet50.yaml
          echo "[servidor] exp08 completado — $(date '+%H:%M:%S')"

      - name: exp07_pretrain — pretrain centralizado con DDSM
        if: ${{ github.event.inputs.skip_pretrain == 'false' }}
        run: |
          echo "══════════════════════════════════════════"
          echo "  [servidor] exp07 pretrain DDSM — $(date '+%Y-%m-%d %H:%M:%S')"
          echo "══════════════════════════════════════════"
          docker rm -f fedmammo-central 2>/dev/null || true
          docker run --rm \
            --name fedmammo-central \
            --gpus all \
            -v "$HOME/fl-data/configs:/app/configs:ro" \
            -v "$HOME/fl-data/manifests:/app/manifests:ro" \
            -v "$HOME/fl-data/data:/app/data:ro" \
            -v "$HOME/fl-data/weights:/app/weights:ro" \
            -v "$HOME/fl-data/runs:/app/runs" \
            ayax911/federal-learning:latest \
            python scripts/run_centralized.py \
              --config configs/exp07_pretrain_ddsm_centralized.yaml
          echo "[servidor] pretrain DDSM completado — $(date '+%H:%M:%S')"

      - name: Verificar que final.pt existe antes de la fase FL
        run: |
          PRETRAIN_PT="$HOME/fl-data/runs/exp07_pretrain_ddsm/final.pt"
          if [ ! -f "$PRETRAIN_PT" ]; then
            echo "ERROR: No se encontró $PRETRAIN_PT"
            echo "Ejecuta de nuevo sin skip_pretrain=true, o coloca el archivo manualmente."
            exit 1
          fi
          echo "OK: $PRETRAIN_PT existe ($(du -h "$PRETRAIN_PT" | cut -f1))"

  # ══════════════════════════════════════════════════════════════════════════
  # FASE 2 — Federado: servidor y nodos arrancan en paralelo tras FASE 1
  # ══════════════════════════════════════════════════════════════════════════

  fl_servidor:
    needs: centralizados
    runs-on: [self-hosted, fl-server]
    defaults:
      run:
        shell: bash
    env:
      FL_EXPERIMENTS: ${{ github.event.inputs.fl_experiments }}
    steps:
      - name: Ejecutar experimentos FL en secuencia (servidor)
        run: |
          docker pull ayax911/federal-learning:latest || true
          for EXP in $FL_EXPERIMENTS; do
            CONFIG="configs/${EXP}_server.yaml"
            echo "══════════════════════════════════════════"
            echo "  [servidor FL] Iniciando: $EXP"
            echo "  $(date '+%Y-%m-%d %H:%M:%S')"
            echo "══════════════════════════════════════════"

            docker rm -f fedmammo-server 2>/dev/null || true
            docker run -d \
              --name fedmammo-server \
              --gpus all \
              -v "$HOME/fl-data/configs:/app/configs:ro" \
              -v "$HOME/fl-data/weights:/app/weights:ro" \
              -v "$HOME/fl-data/runs:/app/runs" \
              -p 8080:8080 \
              ayax911/federal-learning:latest \
              python scripts/run_server.py --config "$CONFIG" --address 0.0.0.0:8080

            echo "[servidor FL] Esperando que $EXP levante..."
            for i in $(seq 1 30); do
              if docker logs fedmammo-server 2>&1 | grep -q "Flower server running"; then
                echo "[servidor FL] $EXP listo — esperando nodos."
                break
              fi
              sleep 2
            done

            EXIT=$(docker wait fedmammo-server)
            echo "[servidor FL] $EXP terminó (exit=$EXIT) — $(date '+%H:%M:%S')"
            docker logs fedmammo-server --tail 30
            if [ "$EXIT" != "0" ]; then
              echo "ERROR: $EXP falló en el servidor (exit=$EXIT). Abortando." >&2
              exit 1
            fi
          done
          echo "✓ Fase FL completa en el servidor."

  fl_nodos:
    needs: centralizados
    strategy:
      matrix:
        node_id: [1, 2, 3, 4, 5]
    runs-on: [self-hosted, "fl-node-${{ matrix.node_id }}"]
    defaults:
      run:
        shell: bash
    env:
      FL_EXPERIMENTS: ${{ github.event.inputs.fl_experiments }}
    steps:
      - name: Ejecutar experimentos FL en secuencia (nodo ${{ matrix.node_id }})
        run: |
          NODE_ID=${{ matrix.node_id }}
          docker pull ayax911/federal-learning:latest || true
          for EXP in $FL_EXPERIMENTS; do
            CONFIG="configs/${EXP}_client.yaml"
            echo "══════════════════════════════════════════"
            echo "  [nodo $NODE_ID] Iniciando: $EXP"
            echo "  $(date '+%Y-%m-%d %H:%M:%S')"
            echo "══════════════════════════════════════════"

            # Head-start: da tiempo al servidor de recrear su contenedor
            sleep 10

            docker rm -f fedmammo-node${NODE_ID} 2>/dev/null || true
            docker run -d \
              --name fedmammo-node${NODE_ID} \
              --gpus all \
              -v "$HOME/fl-data/data:/app/data:ro" \
              -v "$HOME/fl-data/manifests:/app/manifests:ro" \
              -v "$HOME/fl-data/configs:/app/configs:ro" \
              -v "$HOME/fl-data/runs:/app/runs" \
              ayax911/federal-learning:latest \
              python scripts/run_client.py --config "$CONFIG" \
                --server ${{ secrets.SERVER_ADDRESS }} \
                --client-id ${NODE_ID} \
                --manifest manifests/node${NODE_ID}_manifest.csv

            EXIT=$(docker wait fedmammo-node${NODE_ID})
            echo "[nodo $NODE_ID] $EXP terminó (exit=$EXIT) — $(date '+%H:%M:%S')"
            docker logs fedmammo-node${NODE_ID} --tail 20
            if [ "$EXIT" != "0" ]; then
              echo "ERROR: $EXP falló en el nodo $NODE_ID (exit=$EXIT). Abortando." >&2
              exit 1
            fi
          done
          echo "✓ Fase FL completa en el nodo $NODE_ID."
