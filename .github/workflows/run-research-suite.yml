name: Suite Completa de Investigación

# Pipeline configurable de experimentos en dos fases:
#
#   FASE 1 — Centralizados (opcional, corren solos en el servidor):
#     - Pretrain centralizado (ej. exp07/pretrain.yaml o exp12/pretrain.yaml)
#     - Baseline centralizado (ej. exp08/centralized.yaml)
#
#   FASE 2 — Federado (servidor + 5 nodos, en paralelo por Flower):
#     - Lista de experimentos FL separados por espacio
#
# Los nodos esperan a que la FASE 1 termine antes de arrancar la FASE 2.
# Dentro de FASE 2, servidor y nodos corren en paralelo; Flower sincroniza rondas.
#
# Resolución de configs (automática):
#   1. configs/<exp>/<role>.yaml      ← estructura por subdirectorio (nueva)
#   2. configs/<exp>_<role>.yaml      ← estructura flat (legacy)
#
# PREREQUISITOS en la máquina servidor ($HOME/fl-data/):
#   weights/RadImageNet-resnet50.pth
#   manifests/  ← manifests necesarios para cada experimento
#   data/       ← imágenes de los datasets
#
# PREREQUISITOS en cada nodo ($HOME/fl-data/):
#   data/<dataset del nodo>/
#   manifests/node<ID>_manifest.csv

on:
  workflow_dispatch:
    inputs:
      pretrain_exp:
        description: "Experimento de pretrain (ej: exp07, exp12). Vacío = saltar pretrain."
        required: false
        default: ""
        type: string
      centralized_exp:
        description: "Experimento centralizado (ej: exp08, exp10). Vacío = saltar."
        required: false
        default: ""
        type: string
      fl_experiments:
        description: "Experimentos FL separados por espacio (ej: exp13_fedavg_resnet50 exp14_fedprox_resnet50)"
        required: true
        default: "exp13_fedavg_resnet50"
        type: string

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # FASE 1 — Centralizados: corren solos en el servidor (sin nodos)
  # ══════════════════════════════════════════════════════════════════════════
  centralizados:
    runs-on: [self-hosted, fl-server]
    defaults:
      run:
        shell: bash
    steps:
      - name: Pretrain centralizado
        if: ${{ github.event.inputs.pretrain_exp != '' }}
        env:
          PRETRAIN_EXP: ${{ github.event.inputs.pretrain_exp }}
        run: |
          # Resolución de config de pretrain
          NEW="configs/${PRETRAIN_EXP}/pretrain.yaml"
          LEGACY="configs/${PRETRAIN_EXP}_pretrain_ddsm_centralized.yaml"
          if [ -f "$NEW" ]; then CONFIG="$NEW"
          elif [ -f "$LEGACY" ]; then CONFIG="$LEGACY"
          else
            echo "ERROR: Config de pretrain no encontrado para '$PRETRAIN_EXP'." >&2
            echo "  Buscado en: $NEW" >&2
            echo "  Buscado en: $LEGACY" >&2
            exit 1
          fi

          echo "══════════════════════════════════════════"
          echo "  [servidor] Pretrain: $PRETRAIN_EXP ($CONFIG)"
          echo "  $(date '+%Y-%m-%d %H:%M:%S')"
          echo "══════════════════════════════════════════"
          docker pull ayax911/federal-learning:latest || true
          docker rm -f fedmammo-central 2>/dev/null || true
          docker run --rm \
            --name fedmammo-central \
            --gpus all \
            -v "$HOME/fl-data/configs:/app/configs:ro" \
            -v "$HOME/fl-data/manifests:/app/manifests:ro" \
            -v "$HOME/fl-data/data:/app/data:ro" \
            -v "$HOME/fl-data/weights:/app/weights:ro" \
            -v "$HOME/fl-data/runs:/app/runs" \
            ayax911/federal-learning:latest \
            python scripts/run_centralized.py --config "$CONFIG"
          echo "[servidor] Pretrain completado — $(date '+%H:%M:%S')"

      - name: Baseline centralizado
        if: ${{ github.event.inputs.centralized_exp != '' }}
        env:
          CENTRAL_EXP: ${{ github.event.inputs.centralized_exp }}
        run: |
          NEW="configs/${CENTRAL_EXP}/centralized.yaml"
          LEGACY="configs/${CENTRAL_EXP}_centralized_resnet50.yaml"
          if [ -f "$NEW" ]; then CONFIG="$NEW"
          elif [ -f "$LEGACY" ]; then CONFIG="$LEGACY"
          else
            echo "ERROR: Config centralizado no encontrado para '$CENTRAL_EXP'." >&2
            echo "  Buscado en: $NEW" >&2
            echo "  Buscado en: $LEGACY" >&2
            exit 1
          fi

          echo "══════════════════════════════════════════"
          echo "  [servidor] Centralizado: $CENTRAL_EXP ($CONFIG)"
          echo "  $(date '+%Y-%m-%d %H:%M:%S')"
          echo "══════════════════════════════════════════"
          docker pull ayax911/federal-learning:latest || true
          docker rm -f fedmammo-central 2>/dev/null || true
          docker run --rm \
            --name fedmammo-central \
            --gpus all \
            -v "$HOME/fl-data/configs:/app/configs:ro" \
            -v "$HOME/fl-data/manifests:/app/manifests:ro" \
            -v "$HOME/fl-data/data:/app/data:ro" \
            -v "$HOME/fl-data/weights:/app/weights:ro" \
            -v "$HOME/fl-data/runs:/app/runs" \
            ayax911/federal-learning:latest \
            python scripts/run_centralized.py --config "$CONFIG"
          echo "[servidor] Centralizado completado — $(date '+%H:%M:%S')"

  # ══════════════════════════════════════════════════════════════════════════
  # FASE 2 — Federado: servidor y nodos arrancan en paralelo tras FASE 1
  # ══════════════════════════════════════════════════════════════════════════

  fl_servidor:
    needs: centralizados
    runs-on: [self-hosted, fl-server]
    defaults:
      run:
        shell: bash
    env:
      FL_EXPERIMENTS: ${{ github.event.inputs.fl_experiments }}
    steps:
      - name: Ejecutar experimentos FL en secuencia (servidor)
        run: |
          resolve_config() {
            local exp=$1 role=$2
            local new_path="configs/${exp}/${role}.yaml"
            local legacy_path="configs/${exp}_${role}.yaml"
            if [ -f "$new_path" ]; then
              echo "$new_path"
            elif [ -f "$legacy_path" ]; then
              echo "$legacy_path"
            else
              echo "ERROR: Config no encontrado para '$exp' (rol: $role)." >&2
              echo "  Buscado en: $new_path" >&2
              echo "  Buscado en: $legacy_path" >&2
              exit 1
            fi
          }

          docker pull ayax911/federal-learning:latest || true
          for EXP in $FL_EXPERIMENTS; do
            CONFIG=$(resolve_config "$EXP" "server") || exit 1
            echo "══════════════════════════════════════════"
            echo "  [servidor FL] Iniciando: $EXP"
            echo "  Config: $CONFIG"
            echo "  $(date '+%Y-%m-%d %H:%M:%S')"
            echo "══════════════════════════════════════════"

            docker rm -f fedmammo-server 2>/dev/null || true
            docker run -d \
              --name fedmammo-server \
              --gpus all \
              -v "$HOME/fl-data/configs:/app/configs:ro" \
              -v "$HOME/fl-data/weights:/app/weights:ro" \
              -v "$HOME/fl-data/runs:/app/runs" \
              -p 8080:8080 \
              ayax911/federal-learning:latest \
              python scripts/run_server.py --config "$CONFIG" --address 0.0.0.0:8080

            echo "[servidor FL] Esperando que $EXP levante..."
            for i in $(seq 1 30); do
              if docker logs fedmammo-server 2>&1 | grep -q "Flower server running"; then
                echo "[servidor FL] $EXP listo — esperando nodos."
                break
              fi
              sleep 2
            done

            EXIT=$(docker wait fedmammo-server)
            echo "[servidor FL] $EXP terminó (exit=$EXIT) — $(date '+%H:%M:%S')"
            docker logs fedmammo-server --tail 30
            if [ "$EXIT" != "0" ]; then
              echo "ERROR: $EXP falló en el servidor (exit=$EXIT). Abortando." >&2
              exit 1
            fi
          done
          echo "✓ Fase FL completa en el servidor."

  fl_nodos:
    needs: centralizados
    strategy:
      matrix:
        node_id: [1, 2, 3, 4, 5]
    runs-on: [self-hosted, "fl-node-${{ matrix.node_id }}"]
    defaults:
      run:
        shell: bash
    env:
      FL_EXPERIMENTS: ${{ github.event.inputs.fl_experiments }}
    steps:
      - name: Ejecutar experimentos FL en secuencia (nodo ${{ matrix.node_id }})
        run: |
          resolve_config() {
            local exp=$1 role=$2
            local new_path="configs/${exp}/${role}.yaml"
            local legacy_path="configs/${exp}_${role}.yaml"
            if [ -f "$new_path" ]; then
              echo "$new_path"
            elif [ -f "$legacy_path" ]; then
              echo "$legacy_path"
            else
              echo "ERROR: Config no encontrado para '$exp' (rol: $role)." >&2
              echo "  Buscado en: $new_path" >&2
              echo "  Buscado en: $legacy_path" >&2
              exit 1
            fi
          }

          NODE_ID=${{ matrix.node_id }}
          docker pull ayax911/federal-learning:latest || true
          for EXP in $FL_EXPERIMENTS; do
            CONFIG=$(resolve_config "$EXP" "client") || exit 1
            echo "══════════════════════════════════════════"
            echo "  [nodo $NODE_ID] Iniciando: $EXP"
            echo "  Config: $CONFIG"
            echo "  $(date '+%Y-%m-%d %H:%M:%S')"
            echo "══════════════════════════════════════════"

            # Head-start: da tiempo al servidor de recrear su contenedor
            sleep 10

            docker rm -f fedmammo-node${NODE_ID} 2>/dev/null || true
            docker run -d \
              --name fedmammo-node${NODE_ID} \
              --gpus all \
              -v "$HOME/fl-data/data:/app/data:ro" \
              -v "$HOME/fl-data/manifests:/app/manifests:ro" \
              -v "$HOME/fl-data/configs:/app/configs:ro" \
              -v "$HOME/fl-data/runs:/app/runs" \
              ayax911/federal-learning:latest \
              python scripts/run_client.py --config "$CONFIG" \
                --server ${{ secrets.SERVER_ADDRESS }} \
                --client-id ${NODE_ID} \
                --manifest manifests/node${NODE_ID}_manifest.csv

            EXIT=$(docker wait fedmammo-node${NODE_ID})
            echo "[nodo $NODE_ID] $EXP terminó (exit=$EXIT) — $(date '+%H:%M:%S')"
            docker logs fedmammo-node${NODE_ID} --tail 20
            if [ "$EXIT" != "0" ]; then
              echo "ERROR: $EXP falló en el nodo $NODE_ID (exit=$EXIT). Abortando." >&2
              exit 1
            fi
          done
          echo "✓ Fase FL completa en el nodo $NODE_ID."
