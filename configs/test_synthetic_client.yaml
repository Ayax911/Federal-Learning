defaults: base.yaml

name: test_synthetic
mode: federated

data:
  name: synthetic
  image_size: 64
  batch_size: 8
  grayscale: true
  num_classes: 2
  val_fraction: 0.2
  test_fraction: 0.0
  synthetic_num_samples: 100
  num_workers: 0

model:
  name: resnet18
  pretrained: false
  in_channels: 1
  dropout: 0.2
  num_classes: 2

training:
  local_epochs: 1
  optimizer:
    name: adamw
    lr: 1.0e-4
    weight_decay: 1.0e-4
  loss:
    name: ce
    auto_class_weights: true

federated:
  rounds: 3
  strategy:
    name: fedavg
