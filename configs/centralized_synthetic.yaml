# Centralized baseline using synthetic data — useful for sanity-checking the
# data pipeline, model, and training loop before touching FL.

defaults: base.yaml

name: centralized_synthetic
mode: centralized

data:
  name: synthetic
  synthetic_num_samples: 512
  image_size: 128
  batch_size: 32

model:
  name: resnet18
  pretrained: false      # avoids the torchvision download on first run
  in_channels: 1

training:
  epochs: 2
  optimizer:
    lr: 1.0e-3
