# exp05_fedadam_resnet50 — NODOS CLIENTE (5 nodos, sin node0/rsna)
#
# Estrategia: FedAdam — los clientes entrenan con SGD/Adam estándar.
# El paso adaptativo Adam ocurre únicamente en el servidor.
#
# Nodos activos: 1 (cmmd), 2 (inbreast), 3 (cdd-cesm), 4 (kau-bcmd), 5 (dmid).
#
# EJECUCIÓN EN LOTE (recomendado):
#   bash scripts/run_all_node1.sh    (fijar SERVER_ADDRESS e IMAGE_ROOT_HOST)
#   bash scripts/run_all_node5.sh
# ──────────────────────────────────────────────────────────────────────

name: exp05_fedadam_resnet50_5nodes
mode: federated
seed: 42
output_dir: runs/exp05_fedadam_resnet50_5nodes
device: auto

data:
  name: mammo_bench
  manifest_path: manifests/node1_manifest.csv
  image_root: data/
  image_size: 224
  grayscale: false
  num_classes: 2
  batch_size: 32
  num_workers: 0
  val_fraction: 0.15
  test_fraction: 0.0
  image_format: jpg
  normal_policy: benign
  balance_classes: true

model:
  name: resnet50
  weight_source: radimagenet
  checkpoint_path: weights/RadImageNet-resnet50.pth
  in_channels: 3
  num_classes: 1
  dropout: 0.0
  freeze_backbone: true          # DEBE coincidir con el servidor
  unfreeze_at_epoch: 5           # DEBE coincidir con el servidor
  unfreeze_layers: [layer4, fc]  # DEBE coincidir con el servidor

training:
  local_epochs: 5
  grad_clip_norm: 1.0
  mixed_precision: true          # DEBE coincidir con el servidor
  optimizer:
    name: adamw
    lr: 1.0e-4
    lr_head: 1.0e-3              # DEBE coincidir con el servidor
    lr_backbone: 1.0e-4          # DEBE coincidir con el servidor
    weight_decay: 1.0e-4
  scheduler:
    name: cosine
    t_max: 10                    # DEBE coincidir con federated.rounds del servidor
  augmentation:
    horizontal_flip: true
    rotate_limit: 15
    brightness_contrast: true
    normalize_preset: radimagenet_rgb
  loss:
    name: bce
    auto_class_weights: true

evaluation:
  threshold: 0.5
  save_predictions: false

federated:
  rounds: 10          # DEBE coincidir con el servidor
  strategy:
    name: fedadam
    params: {}
