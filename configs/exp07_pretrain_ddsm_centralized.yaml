# exp07_pretrain_ddsm — PRE-ENTRENAMIENTO CENTRALIZADO CON DDSM
#
# PASO 1 del flujo warm-start para exp07_fedavg_resnet50:
#   1. Ejecutar este config → guarda runs/exp07_pretrain_ddsm/final.pt
#   2. El servidor FL carga ese checkpoint (weight_source: custom en el server yaml)
#   3. Distribuye los pesos fine-tuneados a los 6 nodos como punto de arranque
#
# DDSM aquí actúa como dataset centralizado de referencia para "pre-calentar" el
# modelo antes de la convergencia federada heterogénea. Se entrena sobre los
# splits train/val del manifest (ddsm-split.csv ya trae la columna split).
#
# Comando en el contenedor del servidor:
#   docker exec fedmammo-server python scripts/run_centralized.py \
#     --config configs/exp07_pretrain_ddsm_centralized.yaml

name: exp07_pretrain_ddsm
mode: centralized
seed: 42
output_dir: runs/exp07_pretrain_ddsm
device: auto

data:
  name: mammo_bench
  manifest_path: manifests/ddsm-split.csv     # split column: train/val/test
  image_root: data/
  image_size: 224
  grayscale: false
  num_classes: 2
  batch_size: 32
  num_workers: 0
  val_fraction: 0.1        # IGNORADO: ddsm-split.csv ya trae split explícito
  test_fraction: 0.1       # IGNORADO: idem
  image_format: jpg
  normal_policy: benign
  balance_classes: true    # benign 5092 vs malignant 2716 → pos_weight automático

model:
  name: resnet50
  weight_source: radimagenet          # arrancar desde RadImageNet
  checkpoint_path: weights/RadImageNet-resnet50.pth
  in_channels: 3
  num_classes: 1                      # logit único: BCEWithLogitsLoss
  dropout: 0.0
  freeze_backbone: true
  unfreeze_at_epoch: 5                # descongelar en época 5/20 (~25% del entrenamiento)
  unfreeze_layers: [layer4, fc]

training:
  epochs: 100
  grad_clip_norm: 1.0
  mixed_precision: true
  optimizer:
    name: adamw
    lr: 1.0e-4
    lr_head: 1.0e-3
    lr_backbone: 1.0e-4
    weight_decay: 1.0e-4
  scheduler:
    name: cosine
    t_max: 100                        # = training.epochs
  augmentation:
    horizontal_flip: true
    rotate_limit: 15
    brightness_contrast: true
    normalize_preset: radimagenet_rgb
  loss:
    name: bce
    auto_class_weights: true

evaluation:
  threshold: 0.5
  save_predictions: true
