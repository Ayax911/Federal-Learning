# Template for a real CBIS-DDSM FedAvg run. Adjust paths.

defaults: base.yaml

name: fedavg_cbis_ddsm
mode: federated

data:
  name: cbis_ddsm
  manifest_path: data/cbis_ddsm/manifest.csv
  image_root: data/cbis_ddsm/images
  image_format: png
  image_size: 224
  batch_size: 32
  grayscale: true
  columns:
    image_path: image_path
    label: pathology
    patient_id: patient_id
    split: split

partitioning:
  scheme: dirichlet
  alpha: 0.5
  min_per_client: 32

model:
  name: resnet18
  pretrained: true
  in_channels: 1

training:
  local_epochs: 1
  optimizer:
    name: adamw
    lr: 1.0e-4
    weight_decay: 1.0e-4
  loss:
    name: ce
    auto_class_weights: true

federated:
  num_clients: 4
  rounds: 20
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  strategy:
    name: fedavg
