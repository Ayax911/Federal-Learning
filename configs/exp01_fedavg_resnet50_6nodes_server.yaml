# exp01_fedavg_resnet50 — SERVIDOR CENTRAL — 6 NODOS
#
# Configuración para agregación federada con 6 nodos cliente.
# Cada nodo cliente representa una fuente geográfica/institucional diferente.
#
# DISTRIBUCIÓN DE DATOS (6 NODOS + SERVIDOR):
#   Nodo 0 — rsna       — RSNA Screening         (~36 460 filas)
#   Nodo 1 — cmmd       — China                  (~5 202 filas)
#   Nodo 2 — inbreast   — Portugal               (~  410 filas)
#   Nodo 3 — cdd-cesm   — Egipto                 (~  800 filas)
#   Nodo 4 — kau-bcmd   — Arabia Saudita         (~2 337 filas)
#   Nodo 5 — dmid       — Origen desconocido     (~  757 filas)
#   Servidor — ddsm     — USA / CBIS-DDSM (~10 400 filas, pre-entrenamiento)
#
# FASES DE ENTRENAMIENTO (igual a exp01_fedavg_resnet50_5nodes_server.yaml):
#   - Fase A (rondas 0–4)  : backbone congelado, solo cabeza (5 épocas locales)
#   - Fase B (rondas 5–29) : fine-tuning completo (25 épocas locales)
#
# GENERAR MANIFESTS (partición de 6 nodos):
#   python scripts/partition_mammobench.py \
#       --csv data/mammobench/mammo-bench.csv \
#       --out manifests/ \
#       --nodes 6
#
# ARRANCAR SERVIDOR:
#   bash scripts/start_server.sh configs/exp01_fedavg_resnet50_6nodes_server.yaml
#
# ARRANCAR CLIENTES (reemplazar SERVER_IP con IP LAN del servidor):
#   bash scripts/start_client.sh 0 <SERVER_IP>
#   bash scripts/start_client.sh 1 <SERVER_IP>
#   bash scripts/start_client.sh 2 <SERVER_IP>
#   bash scripts/start_client.sh 3 <SERVER_IP>
#   bash scripts/start_client.sh 4 <SERVER_IP>
#   bash scripts/start_client.sh 5 <SERVER_IP>
# ──────────────────────────────────────────────────────────────────────────────

name: exp01_fedavg_resnet50_6nodes
mode: federated
seed: 42
output_dir: runs/exp01_fedavg_resnet50_6nodes
device: auto

data:
  # Evaluación federada pura (sin holdout en servidor)
  name: none
  image_size: 224
  grayscale: false      # false → in_channels=3
  num_classes: 2        # clases del dataset (benign=0, malignant=1)
  batch_size: 32
  num_workers: 0
  val_fraction: 0.0
  test_fraction: 0.0

model:
  name: resnet50
  weight_source: radimagenet
  checkpoint_path: null          # null → usa $FEDMAMMOBENCH_RADIMAGENET_DIR
  in_channels: 3
  num_classes: 1                 # logit único: BCEWithLogitsLoss
  dropout: 0.0
  freeze_backbone: true          # Fase A: solo cabeza (rondas 0–4)
  unfreeze_at_epoch: 5           # Fase B: fine-tuning desde ronda 5

training:
  local_epochs: 1
  grad_clip_norm: 1.0
  mixed_precision: false
  optimizer:
    name: adamw
    lr: 5.0e-5
    weight_decay: 1.0e-4
  scheduler:
    name: cosine
    t_max: 30
  augmentation:
    normalize_preset: radimagenet_rgb
  loss:
    name: bce
    auto_class_weights: true

evaluation:
  threshold: 0.5
  save_predictions: true

federated:
  num_clients: 6                 # 6 nodos físicos cliente
  rounds: 30                     # 30 rondas totales
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  min_fit_clients: 6
  min_evaluate_clients: 6
  min_available_clients: 6       # bloquea hasta que los 6 nodos se conecten
  accept_failures: false
  server_address: "0.0.0.0:8080"
  strategy:
    name: fedavg
    params: {}
