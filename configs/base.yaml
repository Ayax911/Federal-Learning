# Base defaults. Other configs `defaults: base.yaml` to inherit and override.

name: base
mode: federated
seed: 42
output_dir: runs
device: auto

data:
  name: synthetic
  image_size: 224
  grayscale: true
  num_classes: 2
  batch_size: 32
  num_workers: 2
  val_fraction: 0.1
  test_fraction: 0.1
  balance_classes: true

partitioning:
  scheme: iid
  alpha: 0.5
  min_per_client: 16

model:
  name: resnet18
  pretrained: true
  dropout: 0.2
  num_classes: 2
  in_channels: 1

training:
  epochs: 20
  local_epochs: 1
  grad_clip_norm: 0.0
  mixed_precision: false
  optimizer:
    name: adamw
    lr: 1.0e-4
    weight_decay: 1.0e-4
  scheduler:
    name: none
  augmentation:
    horizontal_flip: true
    rotate_limit: 15
    brightness_contrast: true
    normalize_mean: 0.5
    normalize_std: 0.25
  loss:
    name: ce
    auto_class_weights: true

evaluation:
  threshold: 0.5
  save_predictions: false

federated:
  num_clients: 4
  rounds: 10
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  min_fit_clients: 2
  min_evaluate_clients: 2
  min_available_clients: 2
  accept_failures: true
  client_resources:
    num_cpus: 1.0
    num_gpus: 0.0
  strategy:
    name: fedavg
    params: {}
