# Config para los NODOS CLIENTE — experimento gRPC real con Mammo-Bench.
#
# Cada dispositivo físico usa esta misma config. Las rutas específicas
# del nodo (manifest y directorio de imágenes) se pasan como argumentos
# CLI al ejecutar run_client.py, sin necesidad de crear un YAML distinto
# por nodo.
#
# Antes de usar, ajusta:
#   - data.val_fraction -> Fracción de la data local reservada para validación.
#   - training.local_epochs -> Épocas locales por ronda de FL.
#   - federated.rounds  -> Debe coincidir con la config del servidor.
#
# Ejemplo de ejecución en cada nodo:
#
#   Nodo 0:
#   python scripts/run_client.py \
#       --config configs/fedavg_mammobench_client.yaml \
#       --server 192.168.1.10:8080 \
#       --client-id 0 \
#       --manifest manifests/node0_manifest.csv \
#       --data-dir data/mammobench/images
#
#   Nodo 1:
#   python scripts/run_client.py \
#       --config configs/fedavg_mammobench_client.yaml \
#       --server 192.168.1.10:8080 \
#       --client-id 1 \
#       --manifest manifests/node1_manifest.csv \
#       --data-dir data/mammobench/images

defaults: base.yaml

name: fedavg_mammobench
mode: federated

data:
  name: mammo_bench
  # Estas rutas se sobreescriben por CLI (--manifest y --data-dir).
  # Dejarlas como placeholder ayuda a detectar si se olvidó pasar el argumento.
  manifest_path: manifests/node0_manifest.csv  # Sobreescrito por --manifest en CLI
  image_root: data/mammobench/images
  image_format: jpg
  image_size: 224
  batch_size: 32
  grayscale: true
  normal_policy: benign
  val_fraction: 0.15    # 15% de los datos locales se reservan para validación.
  test_fraction: 0.0    # El nodo no tiene test set; la evaluación global es del servidor.
  balance_classes: true

model:
  name: resnet18
  pretrained: true
  in_channels: 1
  dropout: 0.2
  num_classes: 2

training:
  local_epochs: 1       # Épocas de entrenamiento local por ronda.
  optimizer:
    name: adamw
    lr: 1.0e-4
    weight_decay: 1.0e-4
  loss:
    name: ce
    auto_class_weights: true
  augmentation:
    horizontal_flip: true
    rotate_limit: 15
    brightness_contrast: true

evaluation:
  threshold: 0.5

federated:
  rounds: 20            # Debe coincidir con el servidor.
  strategy:
    name: fedavg
