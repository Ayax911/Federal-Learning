# exp13_fedavg_resnet50 — SERVIDOR CENTRAL (5 nodos, warm-start exp07 + fine-tuning completo)
#
# Warm-start desde el pretrain centralizado de exp07 (RadImageNet → DDSM → final.pt).
# Mismo punto de partida que exp07/exp12 pero con fine-tuning completo (freeze_backbone: false)
# y sin descongelamiento progresivo.
#
# Parámetros: 15 épocas locales, 7 rondas, FedAvg
#
# EVALUACIÓN: data.name=none → evaluación 100% federada.

name: exp13_fedavg_resnet50
mode: federated
seed: 42
output_dir: runs/exp13_fedavg_resnet50
device: auto

data:
  name: none              # servidor sin datos → evaluación federada
  image_size: 224
  grayscale: false
  num_classes: 2
  batch_size: 32
  num_workers: 0
  val_fraction: 0.1
  test_fraction: 0.1
  image_format: jpg
  normal_policy: benign

model:
  name: resnet50
  weight_source: custom                              # warm-start desde pretrain exp07 (RadImageNet → DDSM)
  checkpoint_path: runs/exp07_pretrain_ddsm/exp07_pretrain_ddsm/final.pt
  strict_load: false
  in_channels: 3
  num_classes: 1
  dropout: 0.0
  freeze_backbone: false         # fine-tuning completo
  unfreeze_at_epoch: null        # sin descongelamiento por ronda
  local_unfreeze_at_epoch: null  # sin descongelamiento progresivo local
  unfreeze_layers: null

training:
  local_epochs: 15
  grad_clip_norm: 1.0
  mixed_precision: true
  optimizer:
    name: adamw
    lr: 1.0e-4
    lr_head: 1.0e-3
    lr_backbone: 1.0e-4
    weight_decay: 1.0e-4
  scheduler:
    name: cosine
    t_max: 15             # = training.local_epochs (scheduler se reinicia cada ronda)
  augmentation:
    normalize_preset: radimagenet_rgb
  loss:
    name: bce
    auto_class_weights: true

evaluation:
  threshold: 0.5
  save_predictions: true

federated:
  num_clients: 5
  rounds: 7
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  min_fit_clients: 5
  min_evaluate_clients: 5
  min_available_clients: 5
  accept_failures: false
  server_address: "0.0.0.0:8080"
  strategy:
    name: fedavg
    params: {}
