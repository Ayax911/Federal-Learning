# exp19_fedprox_resnet50 — SERVIDOR CENTRAL (5 nodos, FedProx, 34 rondas, warm-start exp15)
#
# Réplica de exp14 con warm-start desde exp15 en vez de exp07. Conserva el
# diseño propio de exp14 (esa es la variable que este experimento prueba):
#   - local_epochs: 3 (corto para muchas rondas)
#   - rounds: 34 (convergencia lenta requiere más rondas)
#   - strategy: fedprox con proximal_mu: 0.1 (regularización para no-IID)
#   - scheduler.t_max: 34 (total rondas, no por-ronda)
#
# A diferencia de exp14, el learning rate ahora es el MISMO que exp16/17/18
# (lr_head=1e-3, lr_backbone=1e-4, antes 5e-4/5e-5) para que checkpoint y LR
# no sean una variable de confusión al comparar FedProx contra FedAvg/centralizado
# — la única diferencia real frente a exp18 pasa a ser la estrategia
# (FedProx vs FedAvg) y el esquema de rondas/épocas locales.
#
# EVALUACIÓN: data.name=none → evaluación 100% federada.

name: exp19_fedprox_resnet50
mode: federated
seed: 42
output_dir: runs/exp19_fedprox_resnet50
device: auto

data:
  name: none              # servidor sin datos → evaluación federada
  image_size: 224
  grayscale: false
  num_classes: 2
  batch_size: 32
  num_workers: 0
  val_fraction: 0.1
  test_fraction: 0.1
  image_format: jpg
  normal_policy: benign

model:
  name: resnet50
  weight_source: custom                              # warm-start desde pretrain centralizado con DDSM (exp15)
  checkpoint_path: runs/exp15_pretrain_ddsm/exp15_pretrain_ddsm/final.pt
  strict_load: false
  in_channels: 3
  num_classes: 1
  dropout: 0.0
  freeze_backbone: false         # fine-tuning completo
  unfreeze_at_epoch: null
  local_unfreeze_at_epoch: null  # sin descongelamiento progresivo
  unfreeze_layers: null

training:
  local_epochs: 3
  grad_clip_norm: 1.0
  mixed_precision: true
  optimizer:
    name: adamw
    lr: 1.0e-4
    lr_head: 1.0e-3
    lr_backbone: 1.0e-4
    weight_decay: 1.0e-4
  scheduler:
    name: cosine
    t_max: 34             # total rondas (no por-ronda)
  augmentation:
    normalize_preset: radimagenet_rgb
  loss:
    name: bce
    auto_class_weights: true

evaluation:
  threshold: 0.5
  save_predictions: true

federated:
  num_clients: 5
  rounds: 34
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  min_fit_clients: 5
  min_evaluate_clients: 5
  min_available_clients: 5
  accept_failures: false
  server_address: "0.0.0.0:8080"
  strategy:
    name: fedprox
    params:
      proximal_mu: 0.1
