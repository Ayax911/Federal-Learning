# exp06_fedprox_resnet50 — SERVIDOR CENTRAL — 5 NODOS
#
# Estrategia: FedProx (Li et al., 2020)
# Añade término proximal (mu/2)||w - w_global||^2 a la función objetivo local.
# El servidor inyecta proximal_mu en cada FitIns; los clientes lo aplican en client.py.
#
# DISTRIBUCIÓN DE DATOS (5 NODOS + SERVIDOR):
#   Nodo 1 — cmmd       — China                  (~5 202 filas)
#   Nodo 2 — inbreast   — Portugal               (~  410 filas)
#   Nodo 3 — cdd-cesm   — Egipto                 (~  800 filas)
#   Nodo 4 — kau-bcmd   — Arabia Saudita         (~2 337 filas)
#   Nodo 5 — dmid       — Origen desconocido     (~  757 filas)
#   Servidor — mini-ddsm — USA / CBIS-DDSM       (~7 808 filas)
#
# ARRANCAR EN LOTE:
#   bash scripts/run_all_experiments_server.sh
# ──────────────────────────────────────────────────────────────────────────────

name: exp06_fedprox_resnet50_5nodes
mode: federated
seed: 42
output_dir: runs/exp06_fedprox_resnet50_5nodes
device: auto

data:
  name: none
  manifest_path: manifests/rsna-screening.csv
  image_size: 224
  grayscale: false
  num_classes: 2
  batch_size: 32
  num_workers: 0
  val_fraction: 0.1
  test_fraction: 0.1
  image_format: jpg
  normal_policy: benign
  image_root: /media/imagenesmedicas/DATA1/01-ImagenesMedicas-US1/02-Databases/Mammo-Bench/c86fb00c-0fb8-4e0e-85a2-4d415f9c1ada_1a9410d8-9769-4064-a064-0160f2fd193d_DATASET-FILE_Mammo_Bench_zip_20241225112148174/Mammo_Data/Mammo-Bench
  columns:
    image_path: preprocessed_image_path
    label: classification
    patient_id: source_subjectID
    split: split

model:
  name: resnet50
  weight_source: radimagenet
  checkpoint_path: weights/RadImageNet-resnet50.pth
  in_channels: 3
  num_classes: 1
  dropout: 0.0
  freeze_backbone: true
  unfreeze_at_epoch: 5
  unfreeze_layers: [layer4, fc]

training:
  local_epochs: 5
  grad_clip_norm: 1.0
  mixed_precision: true
  optimizer:
    name: adamw
    lr: 1.0e-4
    lr_head: 1.0e-3
    lr_backbone: 1.0e-4
    weight_decay: 1.0e-4
  scheduler:
    name: cosine
    t_max: 10
  augmentation:
    normalize_preset: radimagenet_rgb
  loss:
    name: bce
    auto_class_weights: true

evaluation:
  threshold: 0.5
  save_predictions: true

federated:
  num_clients: 5
  rounds: 10
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  min_fit_clients: 5
  min_evaluate_clients: 5
  min_available_clients: 5
  accept_failures: false
  server_address: "0.0.0.0:8080"
  strategy:
    name: fedprox
    params:
      proximal_mu: 0.01   # regularización proximal (Li et al. recomiendan 0.01–0.1)
