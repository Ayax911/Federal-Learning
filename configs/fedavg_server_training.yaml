# Hybrid federated learning: clients train locally AND the central node also
# trains on its own dataset after each round's aggregation.
#
# Set the server's own data under federated.server_training. The client data
# section (data:) is used by the simulated clients as usual.
defaults: base.yaml
name: fedavg_server_training
mode: federated

data:
  name: cbis_ddsm
  manifest_path: /absolute/path/to/clients_manifest.csv
  image_root: /absolute/path/to/images

federated:
  num_clients: 4
  rounds: 10
  strategy:
    name: fedavg
    params: {}
  server_training:
    enabled: true
    # The server's own local dataset (independent of the clients):
    manifest_path: /absolute/path/to/server_manifest.csv
    image_root: /absolute/path/to/server_images
    # dataset_name defaults to data.name (cbis_ddsm) if omitted.
    local_epochs: 1
    # new_global = (1 - server_weight) * aggregated + server_weight * server_trained
    server_weight: 1.0
