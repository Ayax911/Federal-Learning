# Config para el SERVIDOR CENTRAL — experimento gRPC real con Mammo-Bench.
#
# El servidor no entrena localmente. Solo:
#   1. Distribuye el modelo inicial a los clientes.
#   2. Agrega los pesos recibidos tras cada ronda (FedAvg).
#   3. Evalúa el modelo global con su conjunto de test centralizado.
#
# Antes de usar, ajusta:
#   - data.manifest_path  -> CSV con las filas del test set del servidor.
#   - data.image_root     -> Directorio raíz de imágenes en el servidor.
#   - federated.num_clients -> Número real de nodos cliente.
#   - federated.server_address -> IP y puerto del servidor en la LAN.

defaults: base.yaml

name: fedavg_mammobench
mode: federated

data:
  # Cuando el servidor no tiene imágenes reales, usa name: none para que
  # arranque sin datos locales. La evaluación centralizada queda
  # deshabilitada (evaluación 100% federada).
  # Cambiar a name: mammo_bench cuando el servidor tenga su test set.
  name: none
  image_size: 224
  batch_size: 32
  grayscale: true
  num_classes: 2
  num_workers: 0
  val_fraction: 0.0
  test_fraction: 0.0

model:
  name: resnet18
  pretrained: true
  in_channels: 1
  dropout: 0.2
  num_classes: 2

training:
  local_epochs: 1
  optimizer:
    name: adamw
    lr: 1.0e-4
    weight_decay: 1.0e-4
  loss:
    name: ce
    auto_class_weights: true

evaluation:
  threshold: 0.5

federated:
  num_clients: 2          # Node 0 (ddsm/EE.UU.) + Node 1 (cmmd/China).
  rounds: 20
  fraction_fit: 1.0       # Ambos clientes participan en cada ronda.
  fraction_evaluate: 1.0
  min_fit_clients: 2
  min_evaluate_clients: 2
  min_available_clients: 2  # El servidor espera a los 2 nodos antes de comenzar.
  accept_failures: false
  server_address: "0.0.0.0:8080"  # Cambia el puerto si es necesario.
  strategy:
    name: fedavg
