# 4-client FedAvg smoke run on synthetic data. Runs end-to-end on CPU in
# under a minute and validates the full FL plumbing.

defaults: base.yaml

name: fedavg_synthetic
mode: federated

data:
  name: synthetic
  synthetic_num_samples: 256
  image_size: 96
  batch_size: 16

model:
  name: resnet18
  pretrained: false
  in_channels: 1

training:
  local_epochs: 1
  optimizer:
    lr: 1.0e-3

federated:
  num_clients: 4
  rounds: 3
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  min_fit_clients: 2
  min_evaluate_clients: 2
  min_available_clients: 2
  strategy:
    name: fedavg
