# exp27_centralized_ddsm_pretrain — BASELINE CENTRALIZADO, warm-start desde exp15 (DDSM)
#
# Réplica de exp16, re-ejecutada sobre el manifest corregido (mamo-bench-split-no-ddsm-rsna.csv,
# regenerado: 0 IDs duplicados, 0 overlap train/val/test entre datasets). Comparable
# directamente con exp24 (mismo split, mismo tipo de run, pero warm-start RadImageNet
# en vez de DDSM pretrain) para aislar el impacto de la fuente de pretrain.
#
# NOTA: persiste leakage a nivel de paciente dentro de cdd-cesm/cmmd/kau-bcmd
# (~83% de pacientes de val/test también en train) — no corregible con la data
# disponible. El AUC de test debe leerse con esa salvedad.
#
# Estructura del manifest (manifests/mamo-bench-split-no-ddsm-rsna.csv):
#   train: 7 463 imgs  val: 934 imgs  test: 934 imgs  (9 331 total, 5 datasets)
#   (splits ya definidos en el CSV — val/test_fraction ignorados)
#
# Comando:
#   fedmammobench-centralized --config configs/exp27/centralized.yaml

name: exp27_centralized_ddsm_pretrain
mode: centralized
seed: 42
output_dir: runs/exp27_centralized_ddsm_pretrain
device: auto

data:
  name: mammo_bench
  manifest_path: manifests/mamo-bench-split-no-ddsm-rsna.csv   # 9 331 imgs, 5 datasets (sin DDSM)
  image_root: data/
  image_size: 224
  grayscale: false
  num_classes: 2
  batch_size: 32
  num_workers: 0
  val_fraction: 0.1        # IGNORADO: el manifest ya trae split explícito
  test_fraction: 0.1       # IGNORADO: idem
  image_format: jpg
  normal_policy: benign
  balance_classes: true    # datasets desbalanceados (kau-bcmd, cmmd)

model:
  name: resnet50
  weight_source: custom                          # warm start desde pretrain centralizado con DDSM (exp15)
  checkpoint_path: runs/exp15_pretrain_ddsm/exp15_pretrain_ddsm/final.pt
  in_channels: 3
  num_classes: 1                    # logit único: BCEWithLogitsLoss
  dropout: 0.0
  freeze_backbone: false
  unfreeze_at_epoch: null
  unfreeze_layers: null

training:
  epochs: 100
  grad_clip_norm: 1.0
  mixed_precision: true
  optimizer:
    name: adamw
    lr: 1.0e-4
    lr_head: 1.0e-3
    lr_backbone: 1.0e-4
    weight_decay: 1.0e-4
  scheduler:
    name: cosine
    t_max: 100
  augmentation:
    horizontal_flip: true
    rotate_limit: 15
    brightness_contrast: true
    normalize_preset: radimagenet_rgb
  loss:
    name: bce
    auto_class_weights: true

evaluation:
  threshold: 0.5
  save_predictions: true
