# Servidor gRPC — Mammo-Bench, *validación 100% federada*.
#
# Variante de fedavg_mammobench_server.yaml en la que el servidor NO hospeda
# imágenes. La métrica oficial de cada ronda se calcula así:
#   1. Cada cliente evalúa el modelo global agregado contra su val split
#      local (val_fraction definido en el YAML del cliente).
#   2. El servidor promedia los resultados ponderados por num_examples.
#   3. Las métricas se escriben en runs/<name>/server_federated_metrics.csv.
#
# Más alineado con FL estricto: el operador del servidor nunca ve imágenes
# de paciente y no necesita gestionar almacenamiento/cumplimiento para un
# holdout central.

defaults: base.yaml

name: fedavg_mammobench_no_holdout
mode: federated

data:
  # 'none' = sin dataset en el servidor. build_dataset() retorna {} y la
  # evaluación centralizada queda desactivada limpiamente.
  name: none
  image_size: 224
  batch_size: 32
  grayscale: true
  num_classes: 2
  num_workers: 0
  val_fraction: 0.0
  test_fraction: 0.0

model:
  name: resnet18
  pretrained: true
  in_channels: 1
  dropout: 0.2
  num_classes: 2

training:
  local_epochs: 1
  optimizer:
    name: adamw
    lr: 1.0e-4
    weight_decay: 1.0e-4
  loss:
    name: ce
    auto_class_weights: true

evaluation:
  threshold: 0.5

federated:
  num_clients: 2          # Node 0 (ddsm) + Node 1 (cmmd)
  rounds: 20
  fraction_fit: 1.0
  fraction_evaluate: 1.0  # imprescindible para tener métricas federadas
  min_fit_clients: 2
  min_evaluate_clients: 2
  min_available_clients: 2
  accept_failures: false
  server_address: "0.0.0.0:8080"
  strategy:
    name: fedavg
