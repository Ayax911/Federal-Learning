name: exp22_fedprox_radimagenet_node2_eval
mode: centralized
output_dir: runs/exp22_fedprox_radimagenet

data:
  name: mammo_bench
  manifest_path: manifests/node1_manifest.csv
  image_root: data/
  image_size: 224
  grayscale: false
  num_classes: 2
  batch_size: 32
  num_workers: 0
  image_format: jpg
  normal_policy: benign

model:
  name: resnet50
  pretrained: false
  in_channels: 3
  num_classes: 1
  dropout: 0.0
  weight_source: none

training:
  loss:
    name: bce
    auto_class_weights: true

evaluation:
  threshold: 0.5
  save_predictions: true
