# Flower gRPC SERVER — RadImageNet ResNet50, *pure federated evaluation*.
#
# Same as radimagenet_resnet50_grpc_server.yaml but the server does NOT
# host any image data. Validation is 100% federated: clients evaluate the
# aggregated model on their own local val splits and the server
# weighted-averages the metrics (server_federated_metrics.csv).
#
# Use this whenever the operator running the server does not have (or does
# not want to keep) a centralized holdout dataset — the more privacy-aligned
# default for FL deployments.

name: radimagenet_resnet50_grpc_no_holdout
mode: federated
seed: 42
output_dir: runs
device: auto

data:
  # 'none' tells build_dataset to skip dataset construction entirely.
  # No manifest_path / image_root needed; the server process never opens
  # any image file.
  name: none
  # The fields below are still honored by the model factory (image_size)
  # and the DataLoader factories that *clients* will instantiate, but are
  # harmless when the server itself loads no data.
  image_size: 224
  grayscale: true
  num_classes: 2
  batch_size: 16
  num_workers: 0
  val_fraction: 0.0
  test_fraction: 0.0

model:
  name: resnet50
  weight_source: radimagenet
  checkpoint_path: null     # uses $FEDMAMMOBENCH_RADIMAGENET_DIR
  in_channels: 1
  num_classes: 2
  dropout: 0.2
  freeze_backbone: true
  unfreeze_at_epoch: 3

training:
  local_epochs: 1
  grad_clip_norm: 1.0
  mixed_precision: false
  optimizer:
    name: adamw
    lr: 5.0e-5
    weight_decay: 1.0e-4
  scheduler:
    name: none
  augmentation:
    normalize_preset: radimagenet_gray
  loss:
    name: ce
    auto_class_weights: true

evaluation:
  threshold: 0.5
  save_predictions: false

federated:
  num_clients: 2
  rounds: 5
  fraction_fit: 1.0
  fraction_evaluate: 1.0    # all clients evaluate each round
  min_fit_clients: 2
  min_evaluate_clients: 2   # must be >=1 or no federated metric is produced
  min_available_clients: 2
  accept_failures: false
  server_address: "0.0.0.0:8080"
  strategy:
    name: fedavg
    params: {}
