# RadImageNet ResNet50 — centralized fine-tuning.
#
# Workflow:
#   Phase 1 (rounds 0-4)  : freeze_backbone=true → only the new head trains.
#   Phase 2 (rounds 5-30) : unfreeze_at_epoch=5  → full fine-tune with low LR.
#
# Checkpoint placement (choose one):
#   (a) Set model.checkpoint_path to the absolute path of RadImageNet-resnet50.pth
#   (b) Set $FEDMAMMOBENCH_RADIMAGENET_DIR to the directory containing RadImageNet-resnet50.pth
#
# See docs/TRANSFER_LEARNING_GUIDE.md for step-by-step instructions.

name: radimagenet_resnet50_centralized
mode: centralized
seed: 42
output_dir: runs
device: auto

data:
  name: cbis_ddsm          # set manifest_path + image_root below to your data
  manifest_path: /absolute/path/to/manifest.csv
  image_root: /absolute/path/to/images
  image_size: 224
  grayscale: true
  num_classes: 2
  batch_size: 16           # conservative: ResNet50 + 224x224 is ~3x ResNet18
  num_workers: 2
  val_fraction: 0.1
  test_fraction: 0.1
  balance_classes: true

model:
  name: resnet50
  weight_source: radimagenet
  checkpoint_path: null    # override or set $FEDMAMMOBENCH_RADIMAGENET_DIR
  in_channels: 1           # grayscale; loader adapts first conv 3→1 (sum-preserving)
  num_classes: 2
  dropout: 0.2
  freeze_backbone: true    # Phase 1: head-only warm-up
  unfreeze_at_epoch: 5     # Phase 2: progressive unfreezing from epoch 5

training:
  epochs: 30
  local_epochs: 1
  grad_clip_norm: 1.0
  mixed_precision: false   # do not combine with FedProx (known instability)
  optimizer:
    name: adamw
    lr: 1.0e-4             # low: protect RadImageNet priors
    weight_decay: 1.0e-4
  scheduler:
    name: none
  augmentation:
    horizontal_flip: true
    rotate_limit: 10
    brightness_contrast: true
    normalize_preset: radimagenet_gray   # mean=0.5 std=0.5 (RadImageNet convention)
  loss:
    name: ce
    auto_class_weights: true

evaluation:
  threshold: 0.5
  save_predictions: false
