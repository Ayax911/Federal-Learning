# exp16_centralized_resnet50 — BASELINE CENTRALIZADO, warm-start desde exp15 (sin DDSM)
#
# Réplica de exp10, comparable con exp17/18/19 (federados): en vez de arrancar
# desde RadImageNet en frío, parte del checkpoint centralizado en DDSM de
# exp15 (mismo punto de partida que usan los 3 federados), y en vez del
# manifest completo de Mammo-Bench, entrena SOLO sobre los 5 datasets que
# también ven los nodos federados (cmmd, inbreast, cdd-cesm, kau-bcmd, dmid) —
# DDSM queda reservado exclusivamente a la fase de pretrain compartida (exp15),
# igual que en el flujo federado (DDSM nunca es nodo cliente).
#
# Estructura del manifest (manifests/mamo-bench-split-no-ddsm-rsna.csv):
#   train: 7 463 imgs  val: 934 imgs  test: 934 imgs  (9 331 total, 5 datasets)
#   (splits ya definidos en el CSV — val/test_fraction ignorados)
#
# Learning rate igual al de exp15/17/18/19 (lr=1e-4, lr_head=1e-3, lr_backbone=1e-4)
# para que la única variable entre exp16 y exp17/18/19 sea centralizado vs. federado.
#
# Comando:
#   fedmammobench-centralized --config configs/exp16/centralized.yaml
# (o vía /docker-run exp16)

name: exp16_centralized_resnet50
mode: centralized
seed: 42
output_dir: runs/exp16_centralized_resnet50
device: auto

data:
  name: mammo_bench
  manifest_path: manifests/mamo-bench-split-no-ddsm-rsna.csv   # 9 331 imgs, 5 datasets (sin DDSM)
  image_root: data/
  image_size: 224
  grayscale: false
  num_classes: 2
  batch_size: 32
  num_workers: 0
  val_fraction: 0.1        # IGNORADO: el manifest ya trae split explícito
  test_fraction: 0.1       # IGNORADO: idem
  image_format: jpg
  normal_policy: benign
  balance_classes: true    # datasets desbalanceados (kau-bcmd, cmmd)

model:
  name: resnet50
  weight_source: custom                          # warm start desde pretrain centralizado con DDSM (exp15)
  checkpoint_path: runs/exp15_pretrain_ddsm/exp15_pretrain_ddsm/final.pt
  in_channels: 3
  num_classes: 1                    # logit único: BCEWithLogitsLoss
  dropout: 0.0
  freeze_backbone: false
  unfreeze_at_epoch: null
  unfreeze_layers: null

training:
  epochs: 100
  grad_clip_norm: 1.0
  mixed_precision: true
  optimizer:
    name: adamw
    lr: 1.0e-4
    lr_head: 1.0e-3
    lr_backbone: 1.0e-4
    weight_decay: 1.0e-4
  scheduler:
    name: cosine
    t_max: 100
  augmentation:
    horizontal_flip: true
    rotate_limit: 15
    brightness_contrast: true
    normalize_preset: radimagenet_rgb
  loss:
    name: bce
    auto_class_weights: true

evaluation:
  threshold: 0.5
  save_predictions: true
