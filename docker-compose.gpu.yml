# Override de GPU (NVIDIA). Aplícalo SIEMPRE junto al base:
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml \
#       --profile all up --build
#
# (run.sh --gpu lo hace por ti.)
#
# Requisitos en el HOST:
#   - Driver NVIDIA instalado.
#   - nvidia-container-toolkit instalado y el runtime configurado en Docker.
#     Verifica con:  docker run --rm --gpus all nvidia/cuda:12.4.1-base-ubuntu22.04 nvidia-smi
#
# No hace falta cambiar la imagen base: los wheels de PyTorch de PyPI ya
# incluyen las librerías CUDA. El contenedor sólo necesita ACCESO a la GPU,
# que es lo que concede el bloque deploy.devices de abajo.
# El config usa device: auto -> resolve_device() elegirá cuda automáticamente.

x-gpu-reservation: &gpu-reservation
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  server:
    <<: *gpu-reservation
  node0:
    <<: *gpu-reservation
  node1:
    <<: *gpu-reservation
